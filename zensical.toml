[project]
site_name = "poly-data"
site_description = "Polymarket sports data client — Gamma, CLOB, Data API & ESPN wrappers returning DataFrames"
site_author = "Sleuth Capital"
site_url = "https://sleuthcapital.github.io/poly-data/"
copyright = "Copyright &copy; 2026 Sleuth Capital"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Examples" = [
    { "Overview" = "examples/index.md" },
    { "Fetching Events" = "examples/fetching-events.md" },
    { "Price Data & Order Books" = "examples/price-data.md" },
    { "ESPN Game Times" = "examples/espn-game-times.md" },
    { "Market Filtering" = "examples/market-filtering.md" },
    { "Plotting" = "examples/plotting.md" },
  ]},
  { "API Reference" = [
    { "Overview" = "api/index.md" },
    { "GammaClient" = "api/gamma.md" },
    { "ClobClient" = "api/clob.md" },
    { "DataAPIClient" = "api/data-api.md" },
    { "ESPNClient" = "api/espn.md" },
    { "MarketFilter" = "api/markets.md" },
    { "I/O Utilities" = "api/io.md" },
    { "HTTP Internals" = "api/http.md" },
  ]},
  { "Sports Coverage" = "sports-coverage.md" },
]

[project.theme]
language = "en"
features = [
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.repo]
url = "https://github.com/sleuthcapital/poly-data"
name = "sleuthcapital/poly-data"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/sleuthcapital/poly-data"
